name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    # No Docker service — use the system PostgreSQL pre-installed on ubuntu-latest.
    # This avoids Docker Hub pull rate limits / network timeouts entirely.

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL and create test database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres psql -c "CREATE DATABASE test_db;"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: alembic upgrade head

      - name: Smoke-test API startup
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/docs > /dev/null
          echo "API smoke test passed ✓"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://inventoryflow-pro.onrender.com
        run: npm run build

      - name: Check bundle sizes
        working-directory: ./frontend
        run: |
          echo "=== Build output ===" && ls -lh dist/assets/*.js | sort -k5 -rh | head -10
          echo "Build complete ✓"

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Login first so all subsequent docker pulls are authenticated
        # (avoids anonymous rate limits on base images like python:3.12-slim)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t inventoryflow-backend ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://inventoryflow-pro.onrender.com \
            -t inventoryflow-frontend ./frontend

      - name: Push backend image to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag inventoryflow-backend ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:latest
          docker tag inventoryflow-backend ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:${{ github.sha }}
          echo "Pushed ✓ ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:latest"
