name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Backend — migrate + smoke-test
  # Uses system PostgreSQL (no Docker Hub pull = no rate limits)
  # ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── PostgreSQL setup ──────────────────────────────────────
      # ubuntu-latest ships PostgreSQL (14 on 22.04, 16 on 24.04).
      # We switch ALL auth methods to "trust" so password in the
      # connection URL is accepted regardless of pg version.
      - name: Configure & start PostgreSQL
        run: |
          # Start the service (it's installed but not running)
          sudo systemctl start postgresql

          # Detect installed version (e.g. "14" or "16")
          PG_VER=$(pg_lsclusters -h | awk '{print $1}' | head -1)
          echo "Detected PostgreSQL $PG_VER"

          # Replace every auth method with trust (no password check)
          HBA="/etc/postgresql/${PG_VER}/main/pg_hba.conf"
          sudo sed -i 's/scram-sha-256/trust/g' "$HBA"
          sudo sed -i 's/peer/trust/g'          "$HBA"
          sudo sed -i 's/md5/trust/g'            "$HBA"
          sudo systemctl reload postgresql

          # Wait until port 5432 is ready
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL…"; sleep 1
          done

          # Create the test database (trust auth = no password needed)
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE test_db;"
          echo "PostgreSQL ready ✓"

      # ── Python + deps ─────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      # ── Alembic migrations ────────────────────────────────────
      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:anypassword@127.0.0.1:5432/test_db
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          alembic upgrade head
          echo "Migrations complete ✓"

      # ── API smoke test ────────────────────────────────────────
      - name: Smoke-test API
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:anypassword@127.0.0.1:5432/test_db
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          # Override default /app/uploads (no write permission in CI runners)
          UPLOAD_DIR: /tmp/inventoryflow-uploads
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 6
          curl -sf http://localhost:8000/health && echo "  /health ✓"
          curl -sf http://localhost:8000/docs -o /dev/null && echo "  /docs ✓"
          echo "API smoke test passed ✓"

  # ─────────────────────────────────────────────────────────────
  # Job 2: Frontend — install + build
  # ─────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build production bundle
        working-directory: ./frontend
        env:
          VITE_API_URL: https://inventoryflow-pro.onrender.com
        run: npm run build

      - name: Report bundle sizes
        working-directory: ./frontend
        run: |
          echo "── JS chunks ───────────────────────────────"
          ls -lh dist/assets/*.js | sort -k5 -rh | head -10
          echo "── Total dist size ─────────────────────────"
          du -sh dist/
          echo "Build complete ✓"

  # ─────────────────────────────────────────────────────────────
  # Job 3: Docker build (+ optional push to Docker Hub)
  # Only runs on pushes to main after both jobs above pass.
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # Login FIRST so base-image pulls (python:3.12-slim, nginx:alpine)
      # are authenticated → no anonymous rate limits
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend Docker image
        run: docker build -t inventoryflow-backend ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://inventoryflow-pro.onrender.com \
            -t inventoryflow-frontend \
            ./frontend

      - name: Push images to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker tag inventoryflow-backend \
            ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:latest
          docker tag inventoryflow-backend \
            ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:${{ github.sha }}

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inventoryflow-pro-backend:${{ github.sha }}
          echo "Pushed ✓  :latest  and  :${GITHUB_SHA::7}"
